jtex: v1
title: ASTRA Theme
description: >-
  Rich MyST web theme for ASTRA analyses — the presentation half of the
  @astra-spec pair. Extends @myst-theme/book with glyph-tagged inline references
  and hover preview cards, decision/finding/output treatments, live-value
  provenance, and registry tables — keyed on the neutral astra-* markers the
  @astra-spec/mystra plugin emits. A document that renders cleanly on book-theme
  renders richly here by changing one line: `site.template: astra-theme`.
version: 0.0.6
license: BSD-3-Clause
source: https://github.com/LightconeResearch/astra-theme
tags:
  - book
  - astra
options:
  - type: boolean
    id: hide_toc
    description: Hide the table of contents
  - type: boolean
    id: hide_footer_links
    description: Hide the previous/next links in the footer
  - type: boolean
    id: hide_outline
    description: Hide the document outline on all pages
  - type: boolean
    id: hide_title_block
    description: Hide the document title on all pages
  - type: boolean
    id: hide_authors
    description: Hide the authors list on all pages
  - type: boolean
    id: hide_search
    description: Disable the search
  - type: number
    id: outline_maxdepth
    description: The maximum depth to show on the document outline
    min: 1
    max: 6
    integer: true
  - type: string
    id: twitter
    description: Twitter handle related to the site
  - type: file
    id: favicon
    description: Local path to favicon image
  - type: file
    id: logo
    description: Local path to logo image
  - type: file
    id: logo_dark
    description: Local path to logo image for dark mode
  - type: string
    id: logo_text
    description: Short text to display next to logo at the top of all pages
  - type: string
    id: logo_url
    description: If specified, link logo to this URL. Otherwise, point to root page.
  - type: string
    id: logo_alt
    description: Alt text to attach to the logo
  - type: string
    id: analytics_google
    description: Google analytics key
  - type: string
    id: analytics_plausible
    description: Plausible analytics key
  - type: boolean
    id: numbered_references
    description: Show references as numbered, rather than in APA-style
  - type: boolean
    id: folders
    description: Respect nested folder structure in URL paths
  - type: string
    id: internal_domains
    description: A domain to treat as internal links
  - type: file
    id: style
    description: Local path to an extra CSS file (layered on top of the ASTRA stylesheet)
parts:
  - id: footer
    description: The site wide footer
    required: false
  - id: primary_sidebar_footer
    description: The primary sidebar footer, to replace Made with MyST
    required: false
  - id: navbar_end
    description: Custom content displayed at the end of the top navbar
    required: false
build:
  # --legacy-peer-deps must be inline here: the publish workflow ships only the
  # `files:` set below, so the repo's .npmrc never reaches consumers, and the
  # lockfile (generated under legacy-peer-deps) omits auto-installed peers
  # like mapbox-gl/webpack — plain `npm ci` then fails with EUSAGE.
  install: npm ci --ignore-scripts --legacy-peer-deps
  start: npm run start
files:
  - server.js
  - package.json
  - package-lock.json
  - public/**/*
  - build/**/*
